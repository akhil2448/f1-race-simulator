<div class="race-selection-page">
  <div class="page-header">
    <div class="back-home" (click)="goHome()">← HOME</div>

    <div class="hero-track-outline">
      <img src="assets/tracks/suzuka-outline.svg" alt="" />
    </div>

    <div class="page-title">PITWALL</div>

    <div class="title-accent"></div>

    <div class="page-tagline">Replay Formula 1 Races</div>

    <div class="header-toolbar">
      <div class="toolbar-spacer"></div>

      <div class="season-bar">
        <span class="season-bar-label">SEASON</span>

        <select
          class="year-selector"
          [(ngModel)]="selectedYear"
          (change)="onYearChange()"
        >
          <option *ngFor="let year of years" [value]="year">
            {{ year }}
          </option>
        </select>
      </div>

      <div class="support-me-button">
        <app-support-button
          text="Support PitWall"
          buyMeCoffeeUrl="https://buymeacoffee.com/akhil2448"
        >
        </app-support-button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="loading-state">Loading schedule...</div>

  <div *ngIf="error" class="error-state">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="race-grid">
    <div class="race-card" *ngFor="let race of races">
      <div class="round-label">ROUND {{ race.round }}</div>

      <div class="race-header">
        <div class="race-info">
          <div class="race-name">
            {{ race.raceName }}
          </div>

          <div class="location">{{ race.location }}, {{ race.country }}</div>
        </div>

        <img
          class="country-flag"
          [src]="getFlagUrl(race.country)"
          [alt]="race.country"
        />
      </div>

      <div class="session-block">
        <div class="session-title">QUALIFYING</div>

        <div class="session-time">
          {{ race.qualifyingLocalDisplay }}
        </div>
      </div>

      <div class="session-block">
        <div class="session-title">RACE</div>

        <div class="session-time">
          {{ race.raceLocalDisplay }}
        </div>
      </div>

      <button class="jump-button" (click)="jumpToQualifyingResults(race)">
        JUMP TO QUALIFYING RESULTS
      </button>
    </div>
  </div>
</div>
