<div class="overlay-backdrop">
  <div class="overlay-card">
    <div class="race-title">
      {{ raceName | uppercase }}
    </div>

    <div class="steps">
      <div class="step-row" *ngFor="let step of steps">
        <div class="step-icon" [ngClass]="step.status">
          <span *ngIf="step.status === 'pending'">○</span>

          <span *ngIf="step.status === 'success'">✓</span>

          <span *ngIf="step.status === 'error'">✕</span>

          <span *ngIf="step.status === 'loading'" class="spinner"></span>
        </div>

        <div class="step-label">
          {{ step.label }}

          <div
            class="retry-text"
            *ngIf="step.retryCount && step.status === 'loading'"
          >
            Retrying ({{ step.retryCount }}/3)
          </div>
        </div>
      </div>
    </div>

    <div class="footer-text">PREPARING REPLAY</div>
    <!-- MANDATORY FAILURE -->

    <div class="failure-panel mandatory" *ngIf="failureType === 'mandatory'">
      <div class="failure-title">Race Metadata Fetch Failed</div>

      <div class="failure-message">Unable to prepare this replay.</div>
    </div>

    <!-- OPTIONAL FAILURE -->

    <div class="failure-panel optional" *ngIf="failureType === 'optional'">
      <div class="failure-title">Some Components Failed To Load</div>

      <div class="failure-message">
        The replay can still run, but some features may not work.
      </div>
    </div>
  </div>
</div>
