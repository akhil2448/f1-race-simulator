<div class="driver-selection">
  <div class="session-row">
    <div class="section-title">Session</div>

    <div class="session-selector">
      @for (session of sessions; track session) {
        <button
          class="session-button"
          [class.active]="selectedSession === session"
          (click)="selectSession(session)"
        >
          {{ session }}
        </button>
      }
    </div>

    <div class="selected-event">
      {{ selectedYear }}
      <span class="dot">•</span>
      {{ selectedRace }}
    </div>
  </div>

  <div class="section-title drivers-title">Select Drivers</div>

  <div class="driver-grid">
    @for (driver of drivers; track driver.driverCode) {
      <div
        class="driver-card"
        (click)="selectDriver(driver)"
        [style.background]="
          isSelected(driver) ? normalizeColor(driver.teamColor) : '#242424'
        "
        [style.color]="
          isSelected(driver)
            ? getTextColor(normalizeColor(driver.teamColor))
            : '#F3F3F3'
        "
      >
        <div
          class="team-strip"
          [style.background]="normalizeColor(driver.teamColor)"
        ></div>

        <div class="driver-name">
          {{ driver.driverLastName }}
        </div>

        <div class="team-icon">
          <img
            [src]="getTeamLogo(driver.teamName)"
            [class]="getTeamLogoClass(driver.teamName)"
            [class.selected]="isSelected(driver)"
            (error)="onTeamLogoError($event)"
          />
        </div>
      </div>
    }
  </div>
</div>

<div class="action-row">
  <button
    class="continue-button"
    [disabled]="selectedDrivers.length === 0"
    (click)="continueToTelemetry()"
  >
    {{
      selectedDrivers.length === 0
        ? "SELECT AT LEAST ONE DRIVER"
        : "ANALYZE DRIVING STYLE"
    }}
  </button>

  <app-confirmation-dialog
    [visible]="showSingleDriverDialog"
    title="Only one driver selected"
    message="You can compare up to two drivers. Continue with a single driver?"
    confirmText="Continue"
    cancelText="Pick Second Driver"
    (confirmed)="startTelemetryComparison()"
    (cancelled)="showSingleDriverDialog = false"
  >
  </app-confirmation-dialog>
</div>
