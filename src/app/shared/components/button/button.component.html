<button
  (click)="clicked.emit()"
  class="app-button"
  [class.secondary]="variant === 'secondary'"
  [class.xs]="size === 'xs'"
  [class.sm]="size === 'sm'"
  [class.md]="size === 'md'"
  [class.lg]="size === 'lg'"
  [class.fliptrack]="size === 'fliptrack'"
  [class.active]="active"
  [disabled]="disabled"
  type="button"
>
  <ng-content></ng-content>
</button>
