<button
  type="button"
  class="support-button"
  [class.compact]="size === 'compact'"
  (click)="openSupportPage()"
>
  <span class="icon-wrapper">
    <img
      class="icon-default"
      src="assets/icons/coffee-white.svg"
      alt="Support"
    />

    <img
      class="icon-hover"
      src="assets/icons/coffee-official.svg"
      alt="Support"
    />
  </span>

  <span class="button-text">
    {{ text }}
  </span>
</button>
