<div class="race-controls">
  <app-button size="sm" variant="secondary" (clicked)="showTyre()">
    TYRE
  </app-button>

  <app-button size="sm" variant="secondary" (clicked)="showPit()">
    PIT
  </app-button>

  <app-button size="sm" variant="secondary" (clicked)="showLapped()">
    LAPPED
  </app-button>

  <app-support-button
    *ngIf="raceFinished"
    class="support-button"
    text="Support"
  >
  </app-support-button>
</div>
