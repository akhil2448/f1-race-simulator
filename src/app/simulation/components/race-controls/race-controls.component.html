<div class="race-controls">
  <app-button
    size="xs"
    variant="secondary"
    [active]="isPreRace || activeTemporaryMode === 'TYRE'"
    (clicked)="showTyre()"
  >
    TYRE AGE
  </app-button>

  <app-button
    size="xs"
    variant="secondary"
    [disabled]="isPreRace"
    [active]="activeTemporaryMode === 'PIT'"
    (clicked)="showPit()"
  >
    PITSTOP COUNT
  </app-button>

  <app-button
    size="xs"
    variant="secondary"
    [disabled]="isPreRace"
    [active]="activeTemporaryMode === 'LAPPED'"
    (clicked)="showLapped()"
  >
    GAP TO LEADER
  </app-button>

  <app-button
    size="xs"
    variant="secondary"
    [disabled]="isPreRace"
    [active]="activeTemporaryMode === 'GAINED_LOST'"
    (clicked)="showGainLoss()"
  >
    GAINED/LOST
  </app-button>
</div>
