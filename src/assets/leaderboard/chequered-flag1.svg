<svg width="300" height="400" viewBox="0 0 3 4" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- F1 Leaderboard Dark Background -->
  <rect width="3" height="4" fill="#15151e"/>
  
  <!-- Row 1 (White, Black, White) -->
  <rect x="0" y="0" width="1" height="1" fill="#ffffff"/>
  <rect x="2" y="0" width="1" height="1" fill="#ffffff"/>
  
  <!-- Row 2 (Black, White, Black) -->
  <rect x="1" y="1" width="1" height="1" fill="#ffffff"/>
  
  <!-- Row 3 (White, Black, White) -->
  <rect x="0" y="2" width="1" height="1" fill="#ffffff"/>
  <rect x="2" y="2" width="1" height="1" fill="#ffffff"/>
  
  <!-- Row 4 (Black, White, Black) -->
  <rect x="1" y="3" width="1" height="1" fill="#ffffff"/>
</svg>
